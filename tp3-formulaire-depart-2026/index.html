<!doctype html>
<html lang="fr-CA">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander une brochure gratuite</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Votre code HTML commence ici -->
    <header>
        <p class="infos-supp">PUBLICATION GRATUITE</p>
        <h1>Commander une brochure gratuite</h1>
    </header>
    <a class="screen-reader-only focusable" href="#formulaire"> aller au formulaire </a>
    <form class="formulaire" id="formulaire" action="submit_form.php" method="post">
        <legend class="legende">Informations de la brochure</legend>
        <fieldset class="format de la brochure">
            <button type="button" id="brochure" name="brochure" value="format 1"><img src="images/icon-file-print.svg"
                    alt="format 1">Imprimé</button>
            <button type="button" id="brochure" name="brochure" value="format 2"><img src="images/icon-file-pdf.svg"
                    alt="format 2">PDF</button>
            <button type="button" id="brochure" name="brochure" value="format 3"><img src="images/icon-file-epub.svg"
                    alt="format 3">ePub</button>
        </fieldset>

        <legend class="legende">Informations personnelles</legend>
        <fieldset class="informations de contact">
            <label for="prénom">prénom</label>
            <input type="text" id="prénom" name="prénom" required>
            <label for="nom">Nom de famille:</label>
            <input type="text" id="nom" name="nom" required>
            <label for="email">Adresse e-mail: <span class="exemple">(ABC123@gmail.com)</span></label>
            <input type="email" id="email" name="email" required>
            <label for="téléphone">Numéro de téléphone: <span class="exemple">(123-456-7890)</span></label>
            <input type="tel" id="téléphone" name="téléphone" required>
        </fieldset>

        <legend class="legende">Adresse postale</legend>
        <fieldset class="informations postales">
            <label for="address">Adresse postale: <span class="exemple">(123 Rue Exemple)</span></label>
            <input type="text" id="address" name="address" required>
            <label for="pays">Pays:</label>
            <select name="pays" id="pays" class="selection selection--pays">
                <option value="canada">Canada</option>
                <option value="usa">États-Unis</option>
            </select>

            <label for="province ou état">Province ou état:</label>
            <select name="province" class="selection selection--etatprovince">
                <optgroup label="Canada">
                    <option value="AB">Alberta</option>
                    <option value="BC">Colombie-Britannique</option>
                    <option value="QC">Québec</option>
                    <option value="ON">Ontario</option>
                    <option value="MB">Manitoba</option>
                    <option value="NB">Nouveau-Brunswick</option>
                    <option value="NS">Nouvelle-Écosse</option>
                    <option value="PE">Île-du-Prince-Édouard</option>
                    <option value="NL">Terre-Neuve-et-Labrador</option>
                    <option value="SK">Saskatchewan</option>
                    <option value="NT">Territoires du Nord-Ouest</option>
                    <option value="YT">Yukon</option>
                    <option value="NU">Nunavut</option>

                </optgroup>
                <optgroup label="États-Unis">
                    <option value="CA">Californie</option>
                    <option value="NY">New York</option>
                    <option value="TX">Texas</option>
                    <option value="FL">Floride</option>
                    <option value="IL">Illinois</option>
                    <option value="PA">Pennsylvanie</option>
                    <option value="OH">Ohio</option>
                    <option value="GA">Géorgie</option>
                    <option value="NC">Caroline du Nord</option>
                    <option value="MI">Michigan</option>
                    <option value="VA">Virginie</option>
                    <option value="WA">Washington</option>
                    <option value="CO">Colorado</option>
                    <option value="NV">Nevada</option>
                    <option value="AZ">Arizona</option>
                    <option value="MA">Massachusetts</option>
                    <option value="TN">Tennessee</option>

                </optgroup>
            </select>
            <label for="code postal">Code postal:</label>
            <input type="text" id="code postal" name="code postal" required>
        </fieldset>
        <button type="submit">Envoyer <img src="images/icon-arrow.svg" width="20" height="20" alt="Envoyer"></button>
    </form>

</body>

</html>
